name: Formula CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  formula:
    name: Audit and build formula
    runs-on: macos-15
    steps:
      - name: Check out tap
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Register checked-out tap
        run: brew tap preloopdev/somac "$GITHUB_WORKSPACE"

      - name: Audit formula
        run: brew audit --strict --online preloopdev/somac/somac

      - name: Build and install formula
        run: brew install --build-from-source --formula preloopdev/somac/somac

      - name: Smoke test installed binary
        run: "$(brew --prefix somac)/bin/somac --version"
